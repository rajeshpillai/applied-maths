      - id: t4.derivatives-trig-exp-log
        title: "Derivatives of Trig, Exp, and Log Functions"
        prerequisites: [t4.differentiation-rules, t3.unit-circle, t3.exp-log-functions]
        applied-domains: [ai-ml, research, game-dev]
        status: done
        path: lessons/tier-4-precalc-calculus/05-derivatives-trig-exp-log/index.qmd
