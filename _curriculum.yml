# _curriculum.yml — single source of truth for the curriculum dependency graph.
#
# Every lesson on the site is registered here. The lesson's YAML front matter
# (lesson-id, prerequisites, unlocks, applied-domains) MUST match the entry
# below. The landing-page Mermaid graph and the applied-bridges paths are
# derived from this file.
#
# Schema:
#   tiers:
#     - id: t1
#       title: "..."
#       grade-range: "..."
#       summary: "..."
#       lessons:
#         - id: t1.what-is-a-number       # globally unique
#           title: "..."
#           prerequisites: []             # list of lesson ids
#           applied-domains: [encryption] # subset of: ai-ml, game-dev, databases,
#                                         #   systems, encryption, research
#           status: done | drafted | planned
#           path: lessons/tier-1-foundations/01-what-is-a-number/index.qmd

applied-domains:
  - id: ai-ml
    title: "AI / Machine Learning"
  - id: game-dev
    title: "Game Development"
  - id: databases
    title: "Databases"
  - id: systems
    title: "Systems"
  - id: encryption
    title: "Encryption"
  - id: research
    title: "Mathematical Research"

tiers:
  - id: t1
    title: "Foundations"
    grade-range: "Grade 5–7"
    summary: "Number sense, the four operations re-grounded, fractions, ratio, basic geometry, and the seed of every later idea — including primes (the door to encryption)."
    lessons:
      - id: t1.what-is-a-number
        title: "What is a Number?"
        prerequisites: []
        applied-domains: [encryption, research]
        status: done
        path: lessons/tier-1-foundations/01-what-is-a-number/index.qmd
      - id: t1.number-line
        title: "The Number Line"
        prerequisites: [t1.what-is-a-number]
        applied-domains: [research, game-dev]
        status: done
        path: lessons/tier-1-foundations/02-number-line/index.qmd
      - id: t1.place-value
        title: "Place Value (Why Position Matters)"
        prerequisites: [t1.what-is-a-number]
        applied-domains: [systems, encryption, research]
        status: done
        path: lessons/tier-1-foundations/03-place-value/index.qmd
      - id: t1.add-subtract
        title: "Addition and Subtraction, Re-grounded"
        prerequisites: [t1.number-line, t1.place-value]
        applied-domains: [systems, research]
        status: done
        path: lessons/tier-1-foundations/04-add-subtract/index.qmd
      - id: t1.multiply-as-area
        title: "Multiplication as Area"
        prerequisites: [t1.add-subtract]
        applied-domains: [game-dev, ai-ml]
        status: done
        path: lessons/tier-1-foundations/05-multiply-as-area/index.qmd
      - id: t1.divide-fair-share
        title: "Division as Fair Share"
        prerequisites: [t1.multiply-as-area]
        applied-domains: [databases, ai-ml, encryption]
        status: done
        path: lessons/tier-1-foundations/06-divide-fair-share/index.qmd
      - id: t1.fractions-as-parts
        title: "Fractions as Parts of a Whole"
        prerequisites: [t1.divide-fair-share]
        applied-domains: [databases, ai-ml, research]
        status: done
        path: lessons/tier-1-foundations/07-fractions-as-parts/index.qmd
      - id: t1.decimals
        title: "Decimals — Fractions in a New Costume"
        prerequisites: [t1.fractions-as-parts, t1.place-value]
        applied-domains: [systems, ai-ml, research]
        status: done
        path: lessons/tier-1-foundations/08-decimals/index.qmd
      - id: t1.ratio-proportion
        title: "Ratio and Proportion"
        prerequisites: [t1.fractions-as-parts]
        applied-domains: [game-dev, ai-ml, databases]
        status: done
        path: lessons/tier-1-foundations/09-ratio-proportion/index.qmd
      - id: t1.negative-numbers
        title: "Negative Numbers (Below the Ground)"
        prerequisites: [t1.number-line, t1.add-subtract]
        applied-domains: [systems, research, ai-ml]
        status: done
        path: lessons/tier-1-foundations/10-negative-numbers/index.qmd
      - id: t1.intro-variables
        title: "Variables — Names for Unknown Numbers"
        prerequisites: [t1.add-subtract, t1.multiply-as-area]
        applied-domains: [ai-ml, research, encryption]
        status: done
        path: lessons/tier-1-foundations/11-intro-variables/index.qmd
      - id: t1.shapes-angles
        title: "Shapes and Angles"
        prerequisites: []
        applied-domains: [game-dev, research]
        status: done
        path: lessons/tier-1-foundations/12-shapes-angles/index.qmd
      - id: t1.area-perimeter-volume
        title: "Area, Perimeter, Volume"
        prerequisites: [t1.shapes-angles, t1.multiply-as-area]
        applied-domains: [game-dev, research]
        status: done
        path: lessons/tier-1-foundations/13-area-perimeter-volume/index.qmd
      - id: t1.data-and-average
        title: "Data and the Average"
        prerequisites: [t1.divide-fair-share]
        applied-domains: [ai-ml, databases, research]
        status: done
        path: lessons/tier-1-foundations/14-data-and-average/index.qmd
      - id: t1.divisibility-primes
        title: "Divisibility and Primes (the Encryption Seed)"
        prerequisites: [t1.divide-fair-share]
        applied-domains: [encryption, research]
        status: done
        path: lessons/tier-1-foundations/15-divisibility-and-primes/index.qmd

