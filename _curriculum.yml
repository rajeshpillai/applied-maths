# _curriculum.yml — single source of truth for the curriculum dependency graph.
#
# Every lesson on the site is registered here. The lesson's YAML front matter
# (lesson-id, prerequisites, unlocks, applied-domains) MUST match the entry
# below. The landing-page Mermaid graph and the applied-bridges paths are
# derived from this file.
#
# Schema:
#   tiers:
#     - id: t1
#       title: "..."
#       grade-range: "..."
#       summary: "..."
#       lessons:
#         - id: t1.what-is-a-number       # globally unique
#           title: "..."
#           prerequisites: []             # list of lesson ids
#           applied-domains: [encryption] # subset of: ai-ml, game-dev, databases,
#                                         #   systems, encryption, research
#           status: done | drafted | planned
#           path: lessons/tier-1-foundations/01-what-is-a-number/index.qmd

applied-domains:
  - id: ai-ml
    title: "AI / Machine Learning"
  - id: game-dev
    title: "Game Development"
  - id: databases
    title: "Databases"
  - id: systems
    title: "Systems"
  - id: encryption
    title: "Encryption"
  - id: research
    title: "Mathematical Research"

tiers:
  - id: t1
    title: "Foundations"
    grade-range: "Grade 5–7"
    summary: "Number sense, the four operations re-grounded, fractions, ratio, basic geometry, and the seed of every later idea — including primes (the door to encryption)."
    lessons:
      - id: t1.what-is-a-number
        title: "What is a Number?"
        prerequisites: []
        applied-domains: [encryption, research]
        status: done
        path: lessons/tier-1-foundations/01-what-is-a-number/index.qmd
      - id: t1.number-line
        title: "The Number Line"
        prerequisites: [t1.what-is-a-number]
        applied-domains: [research, game-dev]
        status: done
        path: lessons/tier-1-foundations/02-number-line/index.qmd
      - id: t1.place-value
        title: "Place Value (Why Position Matters)"
        prerequisites: [t1.what-is-a-number]
        applied-domains: [systems, encryption, research]
        status: done
        path: lessons/tier-1-foundations/03-place-value/index.qmd
      - id: t1.add-subtract
        title: "Addition and Subtraction, Re-grounded"
        prerequisites: [t1.number-line, t1.place-value]
        applied-domains: [systems, research]
        status: done
        path: lessons/tier-1-foundations/04-add-subtract/index.qmd
      - id: t1.multiply-as-area
        title: "Multiplication as Area"
        prerequisites: [t1.add-subtract]
        applied-domains: [game-dev, ai-ml]
        status: done
        path: lessons/tier-1-foundations/05-multiply-as-area/index.qmd
      - id: t1.divide-fair-share
        title: "Division as Fair Share"
        prerequisites: [t1.multiply-as-area]
        applied-domains: [databases, ai-ml, encryption]
        status: done
        path: lessons/tier-1-foundations/06-divide-fair-share/index.qmd
      - id: t1.fractions-as-parts
        title: "Fractions as Parts of a Whole"
        prerequisites: [t1.divide-fair-share]
        applied-domains: [databases, ai-ml, research]
        status: done
        path: lessons/tier-1-foundations/07-fractions-as-parts/index.qmd
      - id: t1.decimals
        title: "Decimals — Fractions in a New Costume"
        prerequisites: [t1.fractions-as-parts, t1.place-value]
        applied-domains: [systems, ai-ml, research]
        status: done
        path: lessons/tier-1-foundations/08-decimals/index.qmd
      - id: t1.ratio-proportion
        title: "Ratio and Proportion"
        prerequisites: [t1.fractions-as-parts]
        applied-domains: [game-dev, ai-ml, databases]
        status: done
        path: lessons/tier-1-foundations/09-ratio-proportion/index.qmd
      - id: t1.negative-numbers
        title: "Negative Numbers (Below the Ground)"
        prerequisites: [t1.number-line, t1.add-subtract]
        applied-domains: [systems, research, ai-ml]
        status: done
        path: lessons/tier-1-foundations/10-negative-numbers/index.qmd
      - id: t1.intro-variables
        title: "Variables — Names for Unknown Numbers"
        prerequisites: [t1.add-subtract, t1.multiply-as-area]
        applied-domains: [ai-ml, research, encryption]
        status: done
        path: lessons/tier-1-foundations/11-intro-variables/index.qmd
      - id: t1.shapes-angles
        title: "Shapes and Angles"
        prerequisites: []
        applied-domains: [game-dev, research]
        status: done
        path: lessons/tier-1-foundations/12-shapes-angles/index.qmd
      - id: t1.area-perimeter-volume
        title: "Area, Perimeter, Volume"
        prerequisites: [t1.shapes-angles, t1.multiply-as-area]
        applied-domains: [game-dev, research]
        status: done
        path: lessons/tier-1-foundations/13-area-perimeter-volume/index.qmd
      - id: t1.data-and-average
        title: "Data and the Average"
        prerequisites: [t1.divide-fair-share]
        applied-domains: [ai-ml, databases, research]
        status: done
        path: lessons/tier-1-foundations/14-data-and-average/index.qmd
      - id: t1.divisibility-primes
        title: "Divisibility and Primes (the Encryption Seed)"
        prerequisites: [t1.divide-fair-share]
        applied-domains: [encryption, research]
        status: done
        path: lessons/tier-1-foundations/15-divisibility-and-primes/index.qmd

  - id: t2
    title: "Pre-Algebra & Algebra I"
    grade-range: "Grade 8–9"
    summary: "Linear equations and systems, functions as machines, exponents, polynomials, similarity, and the Pythagorean theorem."
    lessons:
      - id: t2.functions-as-machines
        title: "Functions as Machines"
        prerequisites: [t1.intro-variables]
        applied-domains: [ai-ml, research]
        status: done
        path: lessons/tier-2-prealgebra/01-functions-as-machines/index.qmd
      - id: t2.linear-equations-one-var
        title: "Linear Equations in One Variable"
        prerequisites: [t1.intro-variables, t1.negative-numbers]
        applied-domains: [research, ai-ml]
        status: done
        path: lessons/tier-2-prealgebra/02-linear-equations-one-var/index.qmd
      - id: t2.linear-inequalities
        title: "Linear Inequalities"
        prerequisites: [t2.linear-equations-one-var, t1.negative-numbers]
        applied-domains: [research, ai-ml]
        status: done
        path: lessons/tier-2-prealgebra/03-linear-inequalities/index.qmd
      - id: t2.coordinate-plane
        title: "The Coordinate Plane"
        prerequisites: [t1.number-line, t1.negative-numbers]
        applied-domains: [game-dev, ai-ml]
        status: done
        path: lessons/tier-2-prealgebra/04-coordinate-plane/index.qmd
      - id: t2.linear-functions-graphs
        title: "Linear Functions and Their Graphs"
        prerequisites: [t2.functions-as-machines, t2.coordinate-plane]
        applied-domains: [ai-ml, game-dev, research]
        status: planned
        path: lessons/tier-2-prealgebra/05-linear-functions-graphs/index.qmd
      - id: t2.systems-linear-equations
        title: "Systems of Linear Equations"
        prerequisites: [t2.linear-equations-one-var, t2.linear-functions-graphs]
        applied-domains: [ai-ml, research, encryption]
        status: planned
        path: lessons/tier-2-prealgebra/06-systems-linear-equations/index.qmd
      - id: t2.exponents-powers
        title: "Exponents and Powers"
        prerequisites: [t1.multiply-as-area]
        applied-domains: [systems, encryption, ai-ml]
        status: planned
        path: lessons/tier-2-prealgebra/07-exponents-powers/index.qmd
      - id: t2.scientific-notation
        title: "Scientific Notation"
        prerequisites: [t2.exponents-powers, t1.decimals]
        applied-domains: [systems, research, ai-ml]
        status: planned
        path: lessons/tier-2-prealgebra/08-scientific-notation/index.qmd
      - id: t2.square-roots-irrationals
        title: "Square Roots and Irrationals"
        prerequisites: [t2.exponents-powers]
        applied-domains: [research, encryption]
        status: planned
        path: lessons/tier-2-prealgebra/09-square-roots-irrationals/index.qmd
      - id: t2.pythagorean-theorem
        title: "The Pythagorean Theorem"
        prerequisites: [t1.shapes-angles, t1.area-perimeter-volume, t2.square-roots-irrationals]
        applied-domains: [game-dev, research]
        status: planned
        path: lessons/tier-2-prealgebra/10-pythagorean-theorem/index.qmd
      - id: t2.polynomials
        title: "Polynomials — Adding and Multiplying"
        prerequisites: [t1.intro-variables, t1.multiply-as-area, t2.exponents-powers]
        applied-domains: [research, encryption]
        status: planned
        path: lessons/tier-2-prealgebra/11-polynomials/index.qmd
      - id: t2.factoring-polynomials
        title: "Factoring Polynomials"
        prerequisites: [t2.polynomials, t1.divisibility-primes]
        applied-domains: [research, encryption]
        status: planned
        path: lessons/tier-2-prealgebra/12-factoring-polynomials/index.qmd
      - id: t2.similarity-scale
        title: "Similarity and Scale"
        prerequisites: [t1.ratio-proportion, t1.shapes-angles]
        applied-domains: [game-dev, research]
        status: planned
        path: lessons/tier-2-prealgebra/13-similarity-scale/index.qmd
      - id: t2.quadratic-equations-intro
        title: "Quadratic Equations (Intro)"
        prerequisites: [t2.factoring-polynomials, t2.linear-equations-one-var]
        applied-domains: [game-dev, research, ai-ml]
        status: planned
        path: lessons/tier-2-prealgebra/14-quadratic-equations-intro/index.qmd
      - id: t2.sequences-intro
        title: "Sequences (Intro)"
        prerequisites: [t1.intro-variables, t2.exponents-powers]
        applied-domains: [ai-ml, research]
        status: planned
        path: lessons/tier-2-prealgebra/15-sequences-intro/index.qmd

  - id: t3
    title: "Algebra II / Geometry / Trigonometry"
    grade-range: "Grade 10–11"
    summary: "Quadratics and conics, trigonometry, sequences and series, logs and exponentials, combinatorics, basic probability."
    lessons: []

  - id: t4
    title: "Pre-Calculus and Calculus"
    grade-range: "Grade 12"
    summary: "Limits, derivatives, integrals, the fundamental theorem, vectors in 2D and 3D — the first explicit Game Dev bridge."
    lessons: []

  - id: t5
    title: "Undergraduate Core"
    grade-range: "Years 1–2"
    summary: "Linear algebra, multivariable and vector calculus, discrete mathematics and logic, probability and statistics, intro number theory, real analysis."
    lessons: []

  - id: t6
    title: "Undergraduate Advanced"
    grade-range: "Years 3–4"
    summary: "Abstract algebra, complex analysis, numerical methods, ODEs/PDEs, optimisation, graph theory, information theory, Fourier analysis."
    lessons: []

  - id: t7
    title: "Masters Specialisation Tracks"
    grade-range: "Masters"
    summary: "Six parallel tracks branching from Tier 6, one per applied domain."
    lessons: []
