format:
  html:
    theme:
      light: [cosmo, styles/custom.scss]
      dark: [darkly, styles/custom-dark.scss]
    toc: true
    toc-depth: 3
    html-math-method: katex
    callout-appearance: simple
    fig-align: center
    smooth-scroll: true

execute:
  freeze: auto
  echo: false        # hide widget source code in the rendered lesson
  warning: false     # hide R/Python warnings in output
  message: false     # hide R/Python messages in output
