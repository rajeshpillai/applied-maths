format:
  html:
    theme:
      light: [cosmo, styles/custom.scss]
      dark: [darkly, styles/custom-dark.scss]
    toc: true
    toc-depth: 3
    html-math-method: katex
    callout-appearance: simple
    fig-align: center
    smooth-scroll: true
    include-after-body:
      - file: assets/sidebar-toggle.html

